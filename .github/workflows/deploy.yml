
name: Deploy to GitHub Pages
 
on:
  push:
    branches: [main]      # change if your default branch differs
  workflow_dispatch:
 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: pages
  cancel-in-progress: true
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: pnpm/action-setup@v4
        with:
          version: 9
 
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
 
      - name: Install
        run: pnpm install
 
      - name: Build (with correct base path for Pages)
        run: |
          REPO=${GITHUB_REPOSITORY#*/}
          if [[ "$REPO" == *.github.io ]]; then BASE=/; else BASE=/$REPO/; fi
          echo "Building with base=$BASE"
          pnpm run build -- --base="$BASE"
 
      - uses: actions/configure-pages@v5
 
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
 
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
